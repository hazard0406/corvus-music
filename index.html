<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Book Generator</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;background:#111;color:#eee;font-family:Georgia,serif;">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const MODEL = "gemini-1.5-flash";
    const SAVE_KEY = "scene_book_gemini";

    function BookGenerator() {
      const [idea, setIdea] = useState("");
      const [seriesContext, setSeriesContext] = useState("");
      const [outline, setOutline] = useState(null);
      const [chapterIndex, setChapterIndex] = useState(0);
      const [scenes, setScenes] = useState([]);
      const [currentScene, setCurrentScene] = useState("");
      const [loading, setLoading] = useState(false);
      const [feedback, setFeedback] = useState("");
      const [sceneCountInChapter, setSceneCountInChapter] = useState(0);
      const [error, setError] = useState("");
      const [apiKey, setApiKey] = useState("");

      const containerRef = useRef(null);

      const safeJSONParse = (text) => {
        try {
          if (!text || typeof text !== "string") throw new Error("Empty response");
          const cleaned = text.replace(/```json|```/g, "").trim();
          return JSON.parse(cleaned);
        } catch (e) {
          console.error("JSON parse failed:", text);
          return null;
        }
      };

      useEffect(() => {
        try {
          const saved = localStorage.getItem(SAVE_KEY);
          if (saved) {
            const data = JSON.parse(saved);
            setIdea(data.idea || "");
            setSeriesContext(data.seriesContext || "");
            setOutline(data.outline || null);
            setChapterIndex(data.chapterIndex || 0);
            setScenes(data.scenes || []);
            setCurrentScene(data.currentScene || "");
            setSceneCountInChapter(data.sceneCountInChapter || 0);
          }

          const savedKey = localStorage.getItem("gemini_api_key");
          if (savedKey) setApiKey(savedKey);
        } catch (e) {
          console.error(e);
        }
      }, []);

      useEffect(() => {
        try {
          localStorage.setItem(
            SAVE_KEY,
            JSON.stringify({
              idea,
              seriesContext,
              outline,
              chapterIndex,
              scenes,
              currentScene,
              sceneCountInChapter
            })
          );

          if (apiKey) {
            localStorage.setItem("gemini_api_key", apiKey);
          }
        } catch (e) {
          console.error(e);
        }
      }, [idea, seriesContext, outline, chapterIndex, scenes, currentScene, sceneCountInChapter, apiKey]);

      const callGemini = async (prompt) => {
        try {
          const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
              })
            }
          );

          const data = await res.json();

          const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;

          if (!text) {
            console.error(data);
            throw new Error("Empty AI response");
          }

          return text;
        } catch (e) {
          setError("API Error: " + e.message);
          return "";
        }
      };

      const streamText = async (fullText, setter) => {
        let current = "";
        const words = fullText.split(" ");

        for (let i = 0; i < words.length; i++) {
          current += words[i] + " ";
          setter(current);
          await new Promise((r) => setTimeout(r, 8));
        }
      };

      const generateOutline = async () => {
        if (!apiKey.trim()) {
          setError("Please enter your Gemini API key.");
          return;
        }

        setLoading(true);
        setError("");

        const text = await callGemini(`Create a novel outline for this idea:\n${idea}\n\nSeries context:\n${seriesContext}\n\nReturn ONLY valid JSON:\n{"title":"","chapters":[{"number":1,"title":"","summary":""}]}`);

        const parsed = safeJSONParse(text);

        if (!parsed) {
          setError("Failed to parse outline. Try again.");
        } else {
          setOutline(parsed);
        }

        setLoading(false);
      };

      const summarizeStory = async () => {
        if (scenes.length < 3) return "";

        return await callGemini(
          `Summarize this story so far in 5 sentences:\n${scenes.join("\n\n")}`
        );
      };

      const buildPrompt = async (mode = "next") => {
        const chapter = outline.chapters[chapterIndex];
        const summary = await summarizeStory();

        return `You are a novelist.

Book: ${outline.title}
Chapter ${chapter.number}: ${chapter.title}
Summary: ${chapter.summary}

Series context:\n${seriesContext}

Story summary:\n${summary}

Recent scenes:\n${scenes.slice(-2).join("\n\n")}

${
  mode === "continue"
    ? `Continue this scene:\n${currentScene}`
    : mode === "rewrite"
    ? `Rewrite this scene with feedback:\n${currentScene}\nFeedback: ${feedback}`
    : `Write the next scene.`
}

Write 500-800 words. Maintain consistency and end naturally.`;
      };

      const runScene = async (mode) => {
        setLoading(true);
        setError("");
        setCurrentScene("");

        const prompt = await buildPrompt(mode);
        const text = await callGemini(prompt);

        if (!text) {
          setLoading(false);
          return;
        }

        await streamText(text, setCurrentScene);

        setLoading(false);
      };

      const acceptScene = () => {
        const updated = [...scenes, currentScene];
        setScenes(updated);
        setCurrentScene("");

        const newCount = sceneCountInChapter + 1;
        setSceneCountInChapter(newCount);

        if (newCount >= 3 && chapterIndex < outline.chapters.length - 1) {
          setChapterIndex(chapterIndex + 1);
          setSceneCountInChapter(0);
        }
      };

      const exportBook = () => {
        const text = scenes.join("\n\n---\n\n");
        navigator.clipboard.writeText(text);
        alert("Book copied!");
      };

      return (
        <div style={{ padding: 20, maxWidth: 1000, margin: "0 auto" }} ref={containerRef}>
          <h1 style={{ color: "#d4af37" }}>AI Book Generator</h1>

          {error && (
            <div style={{ color: "#ff6b6b", marginBottom: 16 }}>
              {error}
            </div>
          )}

          {!outline && (
            <div>
              <h3>Gemini API Key</h3>
              <input
                type="password"
                value={apiKey}
                onChange={(e) => setApiKey(e.target.value)}
                placeholder="Paste Gemini API key"
                style={{ width: "100%", padding: 10, marginBottom: 20 }}
              />

              <h3>Book Idea</h3>
              <textarea
                value={idea}
                onChange={(e) => setIdea(e.target.value)}
                style={{ width: "100%", height: 140, marginBottom: 20 }}
              />

              <h3>Previous Books In Series</h3>
              <textarea
                value={seriesContext}
                onChange={(e) => setSeriesContext(e.target.value)}
                placeholder="Summarize previous books here..."
                style={{ width: "100%", height: 120, marginBottom: 20 }}
              />

              <button
                onClick={generateOutline}
                disabled={loading || !idea.trim()}
                style={{ padding: "12px 20px", cursor: "pointer" }}
              >
                {loading ? "Generating..." : "Generate Outline"}
              </button>
            </div>
          )}

          {outline && (
            <div>
              <h2>{outline.title}</h2>

              <h3>
                Chapter {outline.chapters[chapterIndex]?.number}: {outline.chapters[chapterIndex]?.title}
              </h3>

              <p>Scenes in this chapter: {sceneCountInChapter}</p>

              <button
                onClick={() => runScene("next")}
                disabled={loading}
                style={{ padding: "10px 18px", marginBottom: 20 }}
              >
                {loading ? "Writing..." : "Write Next Scene"}
              </button>

              {currentScene && (
                <div>
                  <h3>Current Scene</h3>

                  <div
                    style={{
                      whiteSpace: "pre-wrap",
                      lineHeight: 1.7,
                      background: "#1e1e1e",
                      padding: 20,
                      borderRadius: 8,
                      marginBottom: 20
                    }}
                  >
                    {currentScene}
                  </div>

                  <button onClick={() => runScene("continue")}>Continue</button>

                  <button
                    onClick={() => runScene("rewrite")}
                    style={{ marginLeft: 10 }}
                  >
                    Rewrite
                  </button>

                  <button
                    onClick={acceptScene}
                    style={{ marginLeft: 10 }}
                  >
                    Accept Scene
                  </button>

                  <textarea
                    placeholder="Rewrite feedback..."
                    value={feedback}
                    onChange={(e) => setFeedback(e.target.value)}
                    style={{
                      width: "100%",
                      height: 90,
                      marginTop: 20
                    }}
                  />
                </div>
              )}

              {scenes.length > 0 && (
                <div style={{ marginTop: 40 }}>
                  <h3>Story So Far</h3>

                  <button onClick={exportBook}>
                    Copy Full Book
                  </button>

                  {scenes.map((scene, index) => (
                    <div
                      key={index}
                      style={{
                        background: "#1e1e1e",
                        padding: 20,
                        borderRadius: 8,
                        marginTop: 20,
                        whiteSpace: "pre-wrap",
                        lineHeight: 1.7
                      }}
                    >
                      {scene}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<BookGenerator />);
  </script>
</body>
</html>
